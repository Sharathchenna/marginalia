<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --accent: #4b57d6; --accent-2: #7c84ff;
    --bg: #16161c; --card: #1f1f27; --brd: #2c2c36;
    --t1: #ececf2; --t2: #a6a8b6; --t3: #6f7180;
    --green: #36c08a; --danger: #e05c7e;
  }
  * { box-sizing: border-box; }
  body {
    width: 360px; margin: 0; font: 13px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--t1);
  }
  header { display: flex; align-items: center; gap: 9px; padding: 13px 14px; border-bottom: 1px solid var(--brd); }
  header .logo { width: 22px; height: 22px; border-radius: 6px; background: var(--accent); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; }
  header h1 { font-size: 14px; font-weight: 650; margin: 0; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--t3); }
  .pill { width: 8px; height: 8px; border-radius: 50%; background: var(--t3); }
  .pill.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .pill.off { background: var(--danger); }
  .body { padding: 12px 14px 14px; }
  button {
    font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid var(--brd);
    background: var(--card); color: var(--t1); padding: 9px 12px; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.15s;
  }
  button:hover { border-color: var(--accent-2); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { background: #3e49be; }
  button:disabled { opacity: 0.5; cursor: default; }
  .row { display: flex; gap: 8px; margin-top: 8px; }
  .row button { width: auto; flex: 1; }
  .hint { font-size: 11.5px; color: var(--t3); margin: 10px 2px 4px; }
  .list { margin-top: 8px; max-height: 260px; overflow: auto; border: 1px solid var(--brd); border-radius: 9px; }
  .item { display: flex; gap: 9px; padding: 8px 10px; border-bottom: 1px solid var(--brd); align-items: flex-start; }
  .item:last-child { border-bottom: none; }
  .item input { margin-top: 3px; accent-color: var(--accent); }
  .item .meta { min-width: 0; }
  .item .lbl { font-size: 12px; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .typ { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent-2); }
  .toast { margin-top: 10px; font-size: 12px; padding: 8px 10px; border-radius: 8px; display: none; }
  .toast.ok { display: block; background: rgba(54,192,138,0.12); color: var(--green); }
  .toast.err { display: block; background: rgba(224,92,126,0.12); color: var(--danger); }
  .count { font-size: 11px; color: var(--t3); padding: 6px 10px; }
</style>
</head>
<body>
  <header>
    <span class="logo">M</span>
    <h1>Marginalia</h1>
    <span class="status"><span id="pill" class="pill"></span><span id="status">checking…</span></span>
  </header>
  <div class="body">
    <button id="savePage" class="primary">＋ Save this page</button>
    <button id="clip" style="margin-top:8px">📄 Clip page as Markdown</button>
    <button id="scan" style="margin-top:8px">🔎 Find papers on this page</button>

    <div id="results" style="display:none">
      <div class="hint" id="resHint"></div>
      <div class="list" id="list"></div>
      <div class="row">
        <button id="sendSel" class="primary">Send to Marginalia</button>
        <button id="dlSel">Download PDFs</button>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>
  <script src="marg.js"></script>
  <script src="popup.js"></script>
</body>
</html>
