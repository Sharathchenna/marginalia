name: MarginaliaSpike
options:
  bundleIdPrefix: dev.marginalia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  MarginaliaSpike:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: dev.marginalia.spike
        PRODUCT_NAME: MarginaliaSpike
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Marginalia
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Device signing (your free personal team). Simulator builds pass
        # CODE_SIGNING_ALLOWED=NO on the command line instead.
        DEVELOPMENT_TEAM: XFHWLX5XD8
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
schemes:
  MarginaliaSpike:
    build:
      targets:
        MarginaliaSpike: all
    run:
      config: Debug
